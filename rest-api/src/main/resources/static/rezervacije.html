<!doctype html>
<html lang="hr">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Rezervacije</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header class="app-header">
        <div>
            <p class="eyebrow">Rezervacije</p>
            <h1>Slobodni termini</h1>
        </div>
        <nav class="top-nav" aria-label="Glavna navigacija">
            <a class="nav-link" href="sportski-centri.html">Centri</a>
            <a class="nav-link active" href="rezervacije.html">Rezervacije</a>
            <a class="nav-link" href="/swagger-ui.html">Swagger</a>
        </nav>
    </header>

    <main class="page-shell">
        <section class="toolbar" aria-label="Pretraga slobodnih termina">
            <label>
                <span>Sportski centar</span>
                <select id="centarSelect" required>
                    <option value="">Učitavanje centara</option>
                </select>
            </label>
            <label>
                <span>Datum</span>
                <input id="datumInput" type="date" required>
            </label>
            <label>
                <span>Korisnik ID</span>
                <input id="korisnikInput" type="number" min="1" value="1" required>
            </label>
            <button id="traziButton" class="primary-button" type="button">Pretraži termine</button>
        </section>

        <p id="pageMessage" class="message" role="status" aria-live="polite"></p>

        <section class="panel" aria-labelledby="terminiTitle">
            <div class="section-title-row">
                <h2 id="terminiTitle">Dostupni termini</h2>
                <span id="terminiCount" class="counter">0</span>
            </div>
            <div id="terminiContainer"></div>
        </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/rezervacije.js"></script>
</body>
</html>
