<!doctype html>
<html lang="hr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sportski centri</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">REST aplikacija</p>
        <h1>Sportski centri</h1>
      </div>
      <nav class="top-nav" aria-label="Glavna navigacija">
        <a class="nav-link active" href="sportski-centri.html">Centri</a>
        <a class="nav-link" href="rezervacije.html">Rezervacije</a>
      </nav>
    </header>

    <main class="page-shell">
      <section class="toolbar" aria-label="Filter sportskih centara">
        <label>
          <span>Pretraga naziva</span>
          <input id="searchInput" type="search" placeholder="npr. Maksimir" />
        </label>
        <label>
          <span>Mjesto</span>
          <select id="mjestoFilter">
            <option value="">Sva mjesta</option>
          </select>
        </label>
        <button id="filterButton" class="primary-button" type="button">
          Pretraži
        </button>
        <button id="resetFilterButton" class="secondary-button" type="button">
          Očisti
        </button>
      </section>

      <p id="pageMessage" class="message" role="status" aria-live="polite"></p>

      <section class="panel-layout">
        <section class="panel-master" aria-labelledby="tableTitle">
          <div class="section-title-row">
            <h2 id="tableTitle">Popis sportskih centara</h2>
            <span id="centriCount" class="counter">0</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Naziv</th>
                  <th>Adresa</th>
                  <th>Mjesto</th>
                  <th>Radno vrijeme (tjedan, vikend)</th>
                  <th style="width: 100px">Akcija</th>
                </tr>
              </thead>
              <tbody id="centriTableBody"></tbody>
            </table>
          </div>
        </section>

        <section class="panel-sidebar">
          <section class="subsection" aria-labelledby="centarFormTitle">
            <div class="section-title-row compact">
              <h3 id="centarFormTitle">Novi centar</h3>
              <button
                id="resetFormButton"
                class="secondary-button"
                type="button"
                style="min-height: 24px; padding: 2px 8px; font-size: 13px"
              >
                Očisti
              </button>
            </div>
            <form id="centarForm" class="form-grid">
              <label class="full-width">
                <span>Naziv sportskog centra</span>
                <input
                  id="nazivCentra"
                  name="nazivCentra"
                  type="text"
                  required
                />
              </label>
              <label class="full-width">
                <span>Adresa</span>
                <input id="adresa" name="adresa" type="text" required />
              </label>
              <label class="full-width">
                <span>Mjesto</span>
                <select id="idMjesto" name="idMjesto" required></select>
              </label>
              <label>
                <span>Tjedan od</span>
                <input
                  id="radnoVrijemeTjedanOd"
                  name="radnoVrijemeTjedanOd"
                  type="time"
                />
              </label>
              <label>
                <span>Tjedan do</span>
                <input
                  id="radnoVrijemeTjedanDo"
                  name="radnoVrijemeTjedanDo"
                  type="time"
                />
              </label>
              <label>
                <span>Vikend od</span>
                <input
                  id="radnoVrijemeVikendOd"
                  name="radnoVrijemeVikendOd"
                  type="time"
                />
              </label>
              <label>
                <span>Vikend do</span>
                <input
                  id="radnoVrijemeVikendDo"
                  name="radnoVrijemeVikendDo"
                  type="time"
                />
              </label>
              <div class="button-row full-width">
                <button
                  id="saveCentarButton"
                  class="primary-button"
                  type="submit"
                >
                  Spremi centar
                </button>
              </div>
            </form>
          </section>

          <section
            class="subsection"
            style="margin-top: 32px"
            aria-labelledby="mjestoFormTitle"
          >
            <div class="section-title-row compact">
              <h3 id="mjestoFormTitle">Novo mjesto</h3>
              <button
                id="resetMjestoFormButton"
                class="secondary-button"
                type="button"
                style="min-height: 24px; padding: 2px 8px; font-size: 13px"
              >
                Očisti
              </button>
            </div>
            <form id="mjestoForm" class="form-grid" style="margin-bottom: 20px">
              <label class="full-width">
                <span>Naziv mjesta</span>
                <input
                  id="nazivMjesta"
                  name="nazivMjesta"
                  type="text"
                  required
                />
              </label>
              <label class="full-width">
                <span>Poštanski broj</span>
                <input
                  id="postanskiBroj"
                  name="postanskiBroj"
                  type="text"
                  required
                  pattern="\d{5}"
                  minlength="5"
                  maxlength="5"
                  title="Poštanski broj mora sadržavati točno 5 znamenki (npr. 10000)"
                />
              </label>
              <div class="button-row full-width">
                <button
                  id="saveMjestoButton"
                  class="primary-button"
                  type="submit"
                >
                  Spremi mjesto
                </button>
              </div>
            </form>

            <div class="section-title-row compact">
              <h3>Popis mjesta</h3>
            </div>
            <div class="table-wrap" style="max-height: 250px; overflow-y: auto">
              <table>
                <thead>
                  <tr>
                    <th>Naziv</th>
                    <th>P. broj</th>
                    <th>Akcije</th>
                  </tr>
                </thead>
                <tbody id="mjestaTableBody"></tbody>
              </table>
            </div>
          </section>
        </section>
      </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/sportski-centri.js"></script>
  </body>
</html>
