<!doctype html>
<html lang="hr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sportovi</title>
    <link rel="stylesheet" href="css/styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Šifrarnik</p>
        <h1>Sportovi</h1>
      </div>
      <nav class="top-nav" aria-label="Glavna navigacija">
        <a class="nav-link" href="sportski-centri.html">Centri</a>
        <a class="nav-link" href="mjesta.html">Mjesta</a>
        <a class="nav-link active" href="sportovi.html">Sportovi</a>
        <a class="nav-link" href="rezervacije.html">Rezervacije</a>
      </nav>
    </header>

    <main class="page-shell">
      <p id="pageMessage" class="message" role="status" aria-live="polite"></p>

      <section class="panel" aria-labelledby="sportFormTitle">
        <section class="subsection" aria-labelledby="sportFormTitle">
          <div class="section-title-row compact">
            <h3 id="sportFormTitle">Novi sport</h3>
            <button
              id="resetSportFormButton"
              class="secondary-button"
              type="button"
              style="min-height: 24px; padding: 2px 8px; font-size: 13px"
            >
              Očisti
            </button>
          </div>
          <form id="sportForm" class="form-grid">
            <label class="full-width">
              <span>Naziv sporta</span>
              <input
                id="nazivSporta"
                name="nazivSporta"
                type="text"
                required
                maxlength="50"
              />
            </label>
            <div class="button-row full-width">
              <button
                id="saveSportButton"
                class="primary-button"
                type="submit"
              >
                Spremi sport
              </button>
            </div>
          </form>
        </section>

        <section
          class="subsection"
          style="margin-top: 20px"
          aria-labelledby="sportoviTableTitle"
        >
          <div class="section-title-row">
            <h2 id="sportoviTableTitle">Popis sportova</h2>
            <span id="sportoviCount" class="counter">0</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>Naziv sporta</th>
                  <th style="width: 170px">Akcije</th>
                </tr>
              </thead>
              <tbody id="sportoviTableBody"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>

    <script src="js/api.js"></script>
    <script src="js/sportovi.js"></script>
  </body>
</html>
